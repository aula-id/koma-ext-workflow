<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Workflow — office POC</title>
<style>
  :root {
    --bg: #0b0e14;
    --fg: #c8d3f5;
    --dim: #78819b;
    --border: #232936;
    --info: #50c8ff;
    --warn: #ffb43c;
    --px: 3; /* sprite scale */
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  header {
    width: 100%;
    max-width: 1040px;
    padding: 14px 8px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  header h1 { font-size: 15px; margin: 0; }
  header span { color: var(--dim); font-size: 12px; }

  .office {
    position: relative;
    margin: 28px 0 10px;
    width: 960px;
    height: 520px;
    background-image: url("sprites/floor_tile.png");
    background-size: calc(16px * var(--px)) calc(16px * var(--px));
    image-rendering: pixelated;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .office img {
    position: absolute;
    image-rendering: pixelated;
    pointer-events: none;
  }

  .station { position: absolute; width: 96px; }
  .station img { position: absolute; }
  .station .chair   { left: 24px; top: 96px;  width: 48px; height: 48px; z-index: 1; }
  .station .worker  { left: 24px; top: 78px;  width: 48px; height: 48px; z-index: 2; }
  .station .desk    { left: 0;    top: 44px;  width: 96px; height: 48px; z-index: 3; }
  .station .monitor { left: 24px; top: 22px;  width: 48px; height: 36px; z-index: 4; }
  .station .tag {
    position: absolute;
    top: 148px;
    left: -20px;
    width: 136px;
    text-align: center;
    font-size: 11px;
    color: var(--fg);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .station .tag .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: 1px;
  }
  .station .task {
    position: absolute;
    top: 165px;
    left: -20px;
    width: 136px;
    text-align: center;
    font-size: 10px;
    color: var(--dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #pm { width: 48px; height: 48px; z-index: 5; top: 420px; left: 40px; transition: none; }
  #pm-tag {
    position: absolute;
    z-index: 5;
    font-size: 11px;
    color: var(--fg);
    text-align: center;
    width: 80px;
  }

  .legend {
    width: 960px;
    display: flex;
    gap: 24px;
    color: var(--dim);
    font-size: 12px;
    padding: 6px 2px 30px;
  }
  .legend b { color: var(--fg); font-weight: 600; }
  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; vertical-align: 1px; }
  @media (prefers-reduced-motion: reduce) { .anim-stop { animation: none !important; } }
</style>
</head>
<body>
  <header>
    <h1>Workflow</h1>
    <span>virtual office — POC (bullpen tier, 4 desks) · sprites: split PNG frames, generated</span>
  </header>

  <div class="office" id="office"></div>

  <div class="legend">
    <span><span class="dot" style="background:#50c8ff"></span><b>working</b> monitor blinking, hands typing</span>
    <span><span class="dot" style="background:#78819b"></span><b>idle</b> seated, monitor off</span>
    <span><span class="dot" style="background:#3a4256"></span><b>empty desk</b> capacity free</span>
    <span style="margin-left:auto">PM pacing the floor · click nothing, it is a POC</span>
  </div>

<script>
  const S = "sprites/";
  const office = document.getElementById("office");

  // ---- desk stations (bullpen tier: 2 x 2) --------------------------------
  const STATIONS = [
    { x: 120, y:  60, persona: "nova",   status: "working", task: "build-fanout-consumer-worker" },
    { x: 460, y:  60, persona: "mika",   status: "working", task: "create-login-form" },
    { x: 120, y: 250, persona: "tetsuo", status: "review",  task: "email-channel-adapter — in review" },
    { x: 460, y: 250, persona: null,     status: "empty",   task: "capacity free" },
  ];

  const workers = [];
  const reviewScenes = [];

  for (const st of STATIONS) {
    const div = document.createElement("div");
    div.className = "station";
    div.style.left = st.x + "px";
    div.style.top = st.y + "px";

    const chair = new Image();
    chair.src = S + "chair.png";
    chair.className = "chair";
    div.appendChild(chair);

    let workerImg = null;
    if (st.persona) {
      workerImg = new Image();
      workerImg.src = S + `worker_${st.persona}_${st.status === "working" ? "type_a" : "idle"}.png`;
      workerImg.className = "worker";
      div.appendChild(workerImg);
    }

    // review scene: the reviewer walks over and stands beside the desk, debating
    let reviewerImg = null, bubbleW = null, bubbleR = null;
    if (st.status === "review") {
      reviewerImg = new Image();
      reviewerImg.src = S + "reviewer_point_a.png";
      reviewerImg.style.cssText = "left:76px; top:74px; width:48px; height:48px; z-index:4; position:absolute;";
      div.appendChild(reviewerImg);

      bubbleW = new Image();
      bubbleW.src = S + "bubble_excl.png";
      bubbleW.style.cssText = "left:10px; top:52px; width:36px; height:30px; z-index:6; position:absolute;";
      div.appendChild(bubbleW);

      bubbleR = new Image();
      bubbleR.src = S + "bubble_q.png";
      bubbleR.style.cssText = "left:96px; top:48px; width:36px; height:30px; z-index:6; position:absolute;";
      div.appendChild(bubbleR);
    }

    const desk = new Image();
    desk.src = S + "desk.png";
    desk.className = "desk";
    div.appendChild(desk);

    const mon = new Image();
    mon.src = S + (st.status === "working" ? "monitor_on_a.png" : "monitor_off.png");
    mon.className = "monitor";
    div.appendChild(mon);

    const tag = document.createElement("div");
    tag.className = "tag";
    const dotColor =
      st.status === "working" ? "#50c8ff" :
      st.status === "review"  ? "#ffb43c" :
      st.status === "idle"    ? "#78819b" : "#3a4256";
    tag.innerHTML = `<span class="dot" style="background:${dotColor}"></span>${st.persona ?? "—"}${st.status === "review" ? " + reviewer" : ""}`;
    div.appendChild(tag);

    const task = document.createElement("div");
    task.className = "task";
    task.textContent = st.task;
    div.appendChild(task);

    office.appendChild(div);

    if (st.status === "working") {
      workers.push({ img: workerImg, mon, persona: st.persona, phase: Math.random() * 1000 });
    }
    if (st.status === "review") {
      reviewScenes.push({ worker: workerImg, reviewer: reviewerImg, bubbleW, bubbleR, persona: st.persona, beat: 0 });
    }
  }

  // ---- typing + monitor blink (independent phases) ------------------------
  let frame = 0;
  setInterval(() => {
    frame++;
    for (const w of workers) {
      const typeFrame = (frame + Math.floor(w.phase / 250)) % 2 === 0 ? "a" : "b";
      w.img.src = S + `worker_${w.persona}_type_${typeFrame}.png`;
    }
  }, 260);
  setInterval(() => {
    for (const w of workers) {
      const on = Math.random() > 0.18; // occasional dark flicker reads as "screen activity"
      const blinkFrame = Math.random() > 0.5 ? "a" : "b";
      w.mon.src = S + (on ? `monitor_on_${blinkFrame}.png` : "monitor_on_a.png");
    }
  }, 420);

  // ---- review debate: alternating bubbles + gestures -----------------------
  setInterval(() => {
    for (const sc of reviewScenes) {
      sc.beat++;
      const workerTurn = sc.beat % 2 === 0;
      // whoever is "talking" shows their bubble; the other hides
      sc.bubbleW.style.visibility = workerTurn ? "visible" : "hidden";
      sc.bubbleR.style.visibility = workerTurn ? "hidden" : "visible";
      // swap what each bubble says now and then, so it reads as back-and-forth
      if (sc.beat % 4 === 0) {
        const t = sc.bubbleW.src; sc.bubbleW.src = sc.bubbleR.src; sc.bubbleR.src = t;
      }
      sc.reviewer.src = S + (workerTurn ? "reviewer_point_a.png" : "reviewer_point_b.png");
      sc.worker.src = S + `worker_${sc.persona}_${workerTurn ? "type_a" : "idle"}.png`;
    }
  }, 900);

  // ---- PM pacing the bottom floor ------------------------------------------
  const pm = new Image();
  pm.id = "pm";
  pm.src = S + "pm_walk_a.png";
  office.appendChild(pm);
  const pmTag = document.createElement("div");
  pmTag.id = "pm-tag";
  pmTag.textContent = "front office";
  office.appendChild(pmTag);

  let pmX = 40, dir = 1, pmFrame = 0;
  setInterval(() => {
    pmFrame++;
    pmX += dir * 6;
    if (pmX > 860) dir = -1;
    if (pmX < 40) dir = 1;
    pm.src = S + (pmFrame % 2 === 0 ? "pm_walk_a.png" : "pm_walk_b.png");
    pm.style.left = pmX + "px";
    pm.style.transform = dir === 1 ? "scaleX(1)" : "scaleX(-1)";
    pmTag.style.left = (pmX - 16) + "px";
    pmTag.style.top = "472px";
  }, 180);
</script>
</body>
</html>
